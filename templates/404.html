<!-- templates/404.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .error-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        .error-code {
            font-size: 120px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }
        .error-message {
            font-size: 24px;
            color: #333;
            margin-bottom: 20px;
        }
        .error-description {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .btn-home {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.3s ease;
        }
        .btn-home:hover {
            transform: translateY(-2px);
            color: white;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .search-box {
            margin-top: 30px;
        }
        .contact-support {
            margin-top: 20px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <div class="error-message">
            <i class="bi bi-emoji-frown me-2"></i>Oops! Page Not Found
        </div>
        <div class="error-description">
            The page you're looking for doesn't exist or has been moved.
            <br>Let's get you back on track.
        </div>
        
        <div class="d-grid gap-2">
            <a href="{% url 'tasks:dashboard' %}" class="btn btn-home">
                <i class="bi bi-house-door me-2"></i>Go to Dashboard
            </a>
            <a href="javascript:history.back()" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-2"></i>Go Back
            </a>
        </div>
        
        <div class="search-box">
            <p class="text-muted mb-2">Looking for something specific?</p>
            <div class="input-group">
                <input type="text" class="form-control" placeholder="Search tasks..." id="search-input">
                <button class="btn btn-outline-primary" type="button" onclick="searchTasks()">
                    <i class="bi bi-search"></i>
                </button>
            </div>
        </div>
        
        <div class="contact-support mt-4">
            <p class="mb-1">Need help? <a href="mailto:support@taskmanager.com">Contact Support</a></p>
            <p class="mb-0 small">Error: Page not found - {{ request.path }}</p>
        </div>
    </div>

    <script>
    function searchTasks() {
        const query = document.getElementById('search-input').value;
        if (query.trim()) {
            window.location.href = "{% url 'tasks:dashboard' %}?search=" + encodeURIComponent(query);
        }
    }
    
    // Allow Enter key to trigger search
    document.getElementById('search-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            searchTasks();
        }
    });
    </script>
</body>
</html>
