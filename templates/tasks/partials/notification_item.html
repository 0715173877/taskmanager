<div class="notification-item {% if notification.is_read %}read{% endif %} px-3 py-2 border-bottom" 
     {% if not notification.is_read %}
     hx-post="{% url 'tasks:mark_notification_read' notification.id %}" 
     hx-trigger="click" 
     hx-target="this"
     hx-swap="outerHTML"
     {% endif %}
     style="cursor: pointer;">
    <div class="d-flex justify-content-between align-items-start">
        <div class="flex-grow-1">
            <p class="mb-1 {% if not notification.is_read %}fw-semibold{% endif %}">
                {{ notification.message }}
            </p>
            <small class="text-muted">{{ notification.created_at|timesince }} ago</small>
        </div>
        {% if not notification.is_read %}
        <span class="badge bg-danger rounded-pill ms-2">New</span>
        {% else %}
        <span class="badge bg-secondary rounded-pill ms-2">Read</span>
        {% endif %}
    </div>
    {% if notification.task %}
    <div class="mt-2">
        <a href="{% url 'tasks:task_detail' notification.task.id %}" 
           class="btn btn-sm btn-outline-primary" 
           onclick="event.stopPropagation();">
            <i class="bi bi-eye"></i> View Task
        </a>
    </div>
    {% endif %}
</div>

<style>
.notification-item:hover {
    background-color: #f8f9fa;
}
.notification-item.read {
    opacity: 0.7;
}
</style>
