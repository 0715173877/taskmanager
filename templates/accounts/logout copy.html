<!-- templates/accounts/logout.html -->
{% extends 'base.html' %}

{% block title %}Logged Out{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow">
            <div class="card-body p-5 text-center">
                <div class="mb-4">
                    <i class="bi bi-box-arrow-right display-1 text-primary"></i>
                </div>
                <h2 class="mb-3">Logged Out</h2>
                <p class="text-muted mb-4">You have been successfully logged out.</p>
                <div class="d-grid gap-2">
                    <!-- Use direct path instead of url tag -->
                    <a href="/accounts/login/" class="btn btn-primary btn-lg">
                        <i class="bi bi-box-arrow-in-right"></i> Login Again
                    </a>
                    <a href="/tasks/" class="btn btn-outline-secondary">
                        <i class="bi bi-house-door"></i> Go to Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
